# libinput-gestures config — Sway workspaces
# Uses XDG_RUNTIME_DIR (always set) to find the sway socket dynamically,
# so this works both in a terminal and as a systemd user service.

gesture swipe left  3 sh -c '$HOME/.config/sway/scripts/ws-next.sh'
gesture swipe right 3 sh -c '$HOME/.config/sway/scripts/ws-prev.sh'
gesture swipe up    4 sh -c 'swaymsg -s $(ls $XDG_RUNTIME_DIR/sway-ipc.*.sock 2>/dev/null | head -1) exec alacritty'
gesture swipe down  4 sh -c 'swaymsg -s $(ls $XDG_RUNTIME_DIR/sway-ipc.*.sock 2>/dev/null | head -1) exec wlogout'
